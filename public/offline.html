<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Zaya Pocket Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050814;
        --card: rgba(16, 24, 48, 0.82);
        --text: #f4f7ff;
        --muted: #aab7da;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, rgba(32, 159, 255, 0.18), transparent 35%), var(--bg);
        color: var(--text);
      }
      .card {
        max-width: 420px;
        padding: 24px;
        border-radius: 24px;
        background: var(--card);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      }
      h1 { margin: 0 0 12px; font-size: 1.5rem; }
      p { margin: 0; line-height: 1.6; color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Zaya Pocket is offline</h1>
      <p>The app shell is cached, but this screen showed up because the last page could not load. Reopen the app from the Home Screen after the connection or cache settles.</p>
    </main>
  </body>
</html>
